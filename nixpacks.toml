# Monorepo API deploy — Railway service root must be the repository root (not apps/api).
[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
  "npm install -g corepack",
  "corepack enable",
  "corepack prepare pnpm@9.15.4 --activate",
  "pnpm install --frozen-lockfile",
]

[phases.build]
cmds = [
  "pnpm --filter @spt/api prisma:generate",
  "pnpm --filter @spt/api... build",
  "test -f apps/api/dist/apps/api/src/subscribers/subscribers.controller.js",
]

[start]
cmd = "pnpm --filter @spt/api start"
