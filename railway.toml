# API service — Root Directory in Railway dashboard must be / (repo root).
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = [
  "apps/api/**",
  "packages/shared/**",
  "pnpm-lock.yaml",
  "pnpm-workspace.yaml",
  "Dockerfile",
  ".dockerignore",
]

[deploy]
# Run pending Prisma migrations, then start the API.
startCommand = "node scripts/migrate-and-start.mjs"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
