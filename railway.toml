# API service — Root Directory in Railway dashboard must be / (repo root).
[build]
buildCommand = "pnpm install --frozen-lockfile && pnpm --filter @spt/api prisma:generate && pnpm --filter @spt/api... build"
watchPatterns = [
  "apps/api/**",
  "packages/shared/**",
  "pnpm-lock.yaml",
  "pnpm-workspace.yaml",
]

[deploy]
startCommand = "pnpm --filter @spt/api start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
